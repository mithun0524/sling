<svg width="720" height="240" viewBox="0 0 720 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sling">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="720" height="240" rx="28" fill="#0b1020"/>
  <rect x="1" y="1" width="718" height="238" rx="27" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- trajectory arc: the sling flings the payload -->
  <path d="M92 176 Q 210 40 330 96" fill="none" stroke="url(#arc)" stroke-width="4"
        stroke-linecap="round" stroke-dasharray="2 14"/>

  <!-- slingshot fork -->
  <g stroke="#475569" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M92 200 L92 150"/>
    <path d="M92 150 L70 118"/>
    <path d="M92 150 L114 118"/>
  </g>
  <!-- band -->
  <path d="M70 118 Q 100 150 114 118" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <!-- launched payload glyph { } -->
  <circle cx="330" cy="96" r="46" fill="url(#glow)" filter="url(#soft)"/>
  <text x="330" y="112" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="52"
        font-weight="800" fill="#e2e8f0" text-anchor="middle">{ }</text>

  <!-- wordmark -->
  <text x="404" y="150" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="88" font-weight="800" fill="url(#wm)">sling</text>

  <!-- tagline -->
  <text x="408" y="188" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="19" font-weight="500" fill="#64748b" letter-spacing="1">curl, slung.</text>
</svg>
