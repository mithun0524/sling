<svg width="760" height="300" viewBox="0 0 760 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sling">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- terminal window -->
  <rect x="20" y="20" width="720" height="260" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- title bar -->
  <path d="M20 36 a16 16 0 0 1 16 -16 h688 a16 16 0 0 1 16 16 v24 h-720 z" fill="#161b22"/>
  <line x1="20" y1="60" x2="740" y2="60" stroke="#30363d" stroke-width="2"/>
  <circle cx="46"  cy="40" r="7" fill="#ff5f56"/>
  <circle cx="70"  cy="40" r="7" fill="#ffbd2e"/>
  <circle cx="94"  cy="40" r="7" fill="#27c93f"/>
  <text x="380" y="45" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="15" fill="#6e7681" text-anchor="middle">sling — zsh</text>

  <!-- prompt line -->
  <text x="52" y="160" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="62" font-weight="700">
    <tspan fill="#27c93f">$</tspan><tspan fill="#e6edf3"> sling</tspan>
  </text>
  <!-- blinking cursor block -->
  <rect x="350" y="118" width="30" height="52" rx="3" fill="url(#accent)"/>

  <!-- divider -->
  <line x1="52" y1="196" x2="708" y2="196" stroke="#21262d" stroke-width="2"/>

  <!-- tagline as shell comment -->
  <text x="52" y="238" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="22" fill="#6e7681"># clean. save. <tspan fill="#58a6ff">sling.</tspan></text>
</svg>
